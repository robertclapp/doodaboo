name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  build:
    name: ${{ matrix.platform.label }}
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: macos-14
            label: macOS (Apple Silicon)
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - runner: macos-13
            label: macOS (Intel)
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - runner: ubuntu-22.04
            label: Linux
            target: x86_64-unknown-linux-gnu
            args: ""
          - runner: windows-latest
            label: Windows
            target: x86_64-pc-windows-msvc
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: tauri-${{ matrix.platform.target }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            tauri-${{ matrix.platform.target }}-

      - name: Install Linux system deps
        if: matrix.platform.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libdbus-1-dev

      - name: Install JS deps
        run: npm ci

      - name: Build the Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing — wire these secrets when you have a
          # Developer ID certificate. Without them the .app still builds
          # but isn't notarized; users will need to right-click → Open.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri auto-updater signing key — generate once with
          # `npm run tauri -- signer generate -w ~/.tauri/myapp.key`
          # then add the public key here.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Doodaboo ${{ inputs.tag || github.ref_name }}"
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.platform.args }}
