name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: CLI tests
        run: npm run test:cli

      - name: Build
        run: npm run build

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build
        run: npm run build

      - name: Run Playwright tests
        env:
          CI: "true"
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            test-results/
            playwright-results.json
          retention-days: 7

      - name: Comment failure summary on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let body = '### E2E failure summary\n\n';
            body += `Run: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}\n\n`;

            const results = (() => {
              try {
                return JSON.parse(fs.readFileSync('playwright-results.json', 'utf-8'));
              } catch (e) {
                body += `_Couldn't parse playwright-results.json: ${e.message}_\n`;
                return null;
              }
            })();

            const failures = [];
            const walk = (suite) => {
              for (const child of suite.suites ?? []) walk(child);
              for (const spec of suite.specs ?? []) {
                for (const test of spec.tests ?? []) {
                  const lastResult = test.results?.[test.results.length - 1];
                  if (lastResult && lastResult.status !== 'passed' && lastResult.status !== 'skipped') {
                    failures.push({
                      file: spec.file,
                      title: spec.title,
                      message:
                        lastResult.errors?.[0]?.message ??
                        lastResult.error?.message ??
                        'no error message',
                      status: lastResult.status,
                      attempt: lastResult.retry ?? 0,
                    });
                  }
                }
              }
            };
            if (results) {
              for (const suite of results.suites ?? []) walk(suite);
            }

            if (failures.length === 0) {
              body += '_No failed test rows in playwright-results.json — failure may be at setup/build time. Check the workflow log._\n';
            } else {
              body += `**${failures.length} failed test${failures.length === 1 ? '' : 's'}:**\n\n`;
              for (const f of failures) {
                const stripped = f.message
                  .replace(/\x1B\[[0-9;]*m/g, '')
                  .split('\n')
                  .slice(0, 12)
                  .join('\n');
                body += `<details>\n<summary><code>${f.file}</code> — ${f.title} (${f.status}${f.attempt ? `, retry ${f.attempt}` : ''})</summary>\n\n\`\`\`\n${stripped}\n\`\`\`\n\n</details>\n\n`;
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
